<!doctype html>
<html lang="en">

<head>
  <title>Articles</title>
  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Axios -->
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body>
  <nav class="flex justify-between items-center p-4 shadow">
    <h1 class="text-2xl font-bold">Articles</h1>
    <a class="btn btn-primary" href="create.html">➕ New Articles</a>
  </nav>
  <main class="p-4 space-y-4" id="main">

  </main>
  <script>
    const API_URL = "https://zafer.ngrok.io";
    const ENDPOINT = "/posts";
    const main = document.getElementById("main");

    function getPosts() {
      axios.get(API_URL + ENDPOINT)
        .then((res) => {
          const articles = res.data;
          const html = articles.map((v) => `
          
          <div class="card bg-base-300">
            <div class="card-body">
              <div class="card-title">${v.title} !</div>
                <p>${v.body}</p>
              <div class="card-actions">
                <p class="font-bold">${v.author.username}</p>
              <div class="badge badge-success">${v.category}</div>
              </div>
            </div>
          </div>          
          
          `).join("");
          main.innerHTML = html;
        }
        )
    }

    getPosts();
  </script>
</body>




</body>

</html>
